name: Close Resolved Issues
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/close-issues.yml'

permissions:
  issues: write

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Add closing comments and close issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [3];
            for (const num of issues) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: 'This has been addressed in a recent update. Closing this issue. Thanks for the report!'
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  state: 'closed',
                  state_reason: 'completed'
                });
                console.log('Closed issue #' + num);
              } catch (e) {
                console.error('Failed to close issue #' + num + ': ' + e.message);
              }
            }
